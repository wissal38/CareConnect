# Include secret properties
spring.config.import=optional:classpath:application-secret.properties

# ===============================
# Database Configuration
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/connect?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA/Hibernate Configuration
# ===============================
# Pour le développement, utilisez 'update' pour mettre à jour le schéma automatiquement
# En production, utilisez 'validate' ou 'none'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.properties.hibernate.hbm2ddl.auto=update

# Ensure SQL initialization runs after JPA schema creation
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.sql.init.encoding=UTF-8
spring.jpa.defer-datasource-initialization=true

# ===============================
# Thymeleaf Configuration
# ===============================
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.check-template-location=true

# ===============================
# Static Resources Configuration
# ===============================
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.add-mappings=true
spring.web.resources.cache.period=0
spring.resources.cache.period=0

# ===============================
# Server Configuration
# ===============================
server.port=8081

# ===============================
# Flyway Configuration
# ===============================
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.clean-disabled=true
spring.flyway.ignore-migration-patterns=*:missing

# If you prefer Hibernate to manage schema automatically, set:
# spring.jpa.hibernate.ddl-auto=update
# and optionally disable Flyway: spring.flyway.enabled=false

# ===============================
# JWT Configuration
# ===============================
kindconnect.app.jwtSecret=maCleSecreteJWT123456789012345678901234567890
kindconnect.app.jwtExpirationMs=86400000

# ===============================
# Logging Configuration
# ===============================
# Spring Framework
logging.level.org.springframework=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.transaction=TRACE

# Thymeleaf
logging.level.org.thymeleaf=DEBUG

# Hibernate
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.type.descriptor.sql.BasicExtractor=TRACE
logging.level.org.hibernate.pretty=TRACE
logging.level.org.hibernate.engine.transaction=DEBUG

# Application
logging.level.com.kindconnect=TRACE
